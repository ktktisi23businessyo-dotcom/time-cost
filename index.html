<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#2563eb">
  <title>1日のお金 - 固定費を時間コストに換算</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" href="icons/icon-192.png">
</head>
<body>
  <div class="container">
    <header>
      <h1>1日のお金</h1>
      <p class="subtitle">固定費を時間コストに換算</p>
    </header>

    <section class="cost-display" aria-label="時間コスト表示">
      <h2>時間コスト</h2>
      <div class="cost-grid">
        <div class="cost-item">
          <span class="cost-label">月額</span>
          <span id="monthly-total" class="cost-value">0</span>
          <span class="cost-unit">円</span>
        </div>
        <div class="cost-item">
          <span class="cost-label">1日</span>
          <span id="daily-cost" class="cost-value">0</span>
          <span class="cost-unit">円</span>
        </div>
        <div class="cost-item">
          <span class="cost-label">1時間</span>
          <span id="hourly-cost" class="cost-value">0</span>
          <span class="cost-unit">円</span>
        </div>
        <div class="cost-item">
          <span class="cost-label">1分</span>
          <span id="minute-cost" class="cost-value">0</span>
          <span class="cost-unit">円</span>
        </div>
      </div>
    </section>

    <section class="form-section" aria-label="固定費登録">
      <h2>固定費を登録</h2>
      <div id="error-message" class="error-message" role="alert" aria-live="polite"></div>
      <form id="fixed-cost-form">
        <div class="form-group">
          <label for="category">カテゴリ <span class="required">必須</span></label>
          <select id="category" name="category" required>
            <option value="">選択してください</option>
            <option value="家賃">家賃</option>
            <option value="保険">保険</option>
            <option value="通信費">通信費</option>
            <option value="サブスク">サブスク</option>
            <option value="車関連">車関連</option>
            <option value="その他">その他</option>
          </select>
        </div>
        <div class="form-group">
          <label for="name">項目名 <span id="name-required-hint" class="optional">（その他の場合必須）</span></label>
          <input type="text" id="name" name="name" placeholder="例：Netflix">
        </div>
        <div class="form-group">
          <label for="amount">月額金額 <span class="required">必須</span></label>
          <input type="number" id="amount" name="amount" placeholder="円" min="0" step="1" required>
        </div>
        <div class="form-group">
          <label for="memo">メモ</label>
          <input type="text" id="memo" name="memo" placeholder="任意">
        </div>
        <input type="hidden" id="edit-id" name="editId" value="">
        <button type="submit" id="submit-btn" class="btn btn-primary">登録</button>
        <button type="button" id="cancel-btn" class="btn btn-secondary" style="display:none;">キャンセル</button>
      </form>
    </section>

    <section class="list-section" aria-label="固定費一覧">
      <h2>固定費一覧</h2>
      <div id="list-empty" class="list-empty">登録された固定費はありません</div>
      <ul id="fixed-cost-list" class="fixed-cost-list"></ul>
    </section>

  </div>

  <div id="delete-modal" class="modal" role="dialog" aria-modal="true" aria-labelledby="delete-modal-title" aria-hidden="true">
    <div class="modal-backdrop"></div>
    <div class="modal-content">
      <h3 id="delete-modal-title">削除の確認</h3>
      <p id="delete-modal-message">この固定費を削除しますか？</p>
      <div class="modal-actions">
        <button type="button" id="delete-confirm-btn" class="btn btn-danger">削除する</button>
        <button type="button" id="delete-cancel-btn" class="btn btn-secondary">キャンセル</button>
      </div>
    </div>
  </div>

  <script src="js/storage.js"></script>
  <script src="js/calculator.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(function(err) {
        console.warn('SW registration failed:', err);
      });
    }
  </script>
</body>
</html>
